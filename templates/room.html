    body {
  margin: 0;
  font-family: monospace;
  background: #0f0f12;
  color: #eee;
}

.app {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 10px;
  max-width: 700px;
  margin: auto;
}

/* TOP BAR */
.topbar {
  background: #5a409b;
  
  border-radius: 8px;
  align-items: center;
  display: flex;
  justify-content: center;
}
.topbar h2{
  align-items: center;
  display: flex;
}
/* STATUS */
.status {
  background: #15151c;
  padding: 10px;
  border-radius: 8px;
}

/* FILES */
.files {
  background: #15151c;
  padding: 10px;
  border-radius: 8px;
}

/* TEXT */
.text {
  background: #15151c;
  padding: 10px;
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* INPUTY */
input {
  padding: 8px;
  background: #222;
  border: none;
  color: white;
  border-radius: 6px;
}

button {
  padding: 8px;
  background: #2b6cff;
  border: none;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #1f4fc9;
}

  </style>

</head>

<body>

<div class="app">
  <div class="topbar">
    <h2 id="topbar">WebDrop || Room: {{ room_id }} || 🔴 Disconnected</h2>
  </div>
  
  <div class="status">
    <div class="peers"><h3>Peers: </h3>
      <ul id="peerList">

      </ul>
    </div>
  </div>

  <div class="files">
    <h3>Files: </h3>
    <ul id="fileList">

    </ul>
    <input type="file" id="fileInput">
    <button id="fileBtn">Send file</button>
  </div>

  <div class="filelist">
  </div>
  
  <div class="text">
    <div id="messages">
    </div>

      <input id="messageInput" placeholder="message...">
      <button id="sendBtn">Send</button>  
  </div>
</div>
