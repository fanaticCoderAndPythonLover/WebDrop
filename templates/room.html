<!DOCTYPE html>
<html>

<head>
  <title>Room {{ room_id }}</title>
  <script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"></script>
  <style>
    body {
      font-family: Arial;
      background: #111111;
      color: white;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 600px;
      margin-top: 40px;
    }

    #messages {
      background: #111827;
      padding: 10px;
      height: 300px;
      overflow-y: auto;
      border-radius: 10px;
    }

    input,
    button {
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    .file {
      margin-top: 5px;
      padding: 5px;
      background: #1f2937;
      border-radius: 6px;
    }

    a {
      color: #20e395;
    }
  </style>

</head>

<body>

  <div class="container">

    <h1>Room {{ room_id }}</h1>

    <div id="messages"></div>


    <input id="messageInput">
    <button id='sendBtn'>Send</button>
    <br>

    <input type="file" id="fileInput">
    <button id="fileBtn">Send file</button>
  </div>

  <script>
    const ROOM_ID = "{{ room_id }}"

  </script>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="{{ url_for('static', filename='room.js') }}"></script>
</body>

</html>
